<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // GitHub Pages SPA redirect — restore URL from 404.html redirect
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          var path = decodeURIComponent(p[1]);
          window.history.replaceState(null, null, '/' + path + window.location.hash);
        }
      })();
    </script>
    <title>Stardust · Online Organizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; overflow-x: hidden; }
      body { overflow-x: hidden; }

      body {
        background-color: #090810;
        background-image:
          radial-gradient(ellipse 130% 55% at 50% -8%, rgba(212,168,74,0.09) 0%, transparent 58%),
          radial-gradient(ellipse 55% 45% at 88% 100%, rgba(155,143,212,0.055) 0%, transparent 55%),
          radial-gradient(ellipse 40% 35% at 4% 65%,  rgba(212,168,74,0.03)  0%, transparent 50%);
        min-height: 100vh;
      }

      /* Film grain */
      body::after {
        content: '';
        position: fixed;
        inset: -100px;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        opacity: 0.032;
        pointer-events: none;
        z-index: 9998;
        animation: grain 8s steps(10) infinite;
      }

      @keyframes grain {
        0%   { transform: translate(0,    0);    }  10%  { transform: translate(-3%,  -7%);  }
        20%  { transform: translate( 4%,   3%);  }  30%  { transform: translate(-3%,   5%);  }
        40%  { transform: translate( 3%,  -4%);  }  50%  { transform: translate(-2%,   4%);  }
        60%  { transform: translate( 4%,  -3%);  }  70%  { transform: translate(-3%,   2%);  }
        80%  { transform: translate( 2%,  -5%);  }  90%  { transform: translate(-4%,   3%);  }
        100% { transform: translate( 0,    0);    }
      }

      @keyframes twinkle {
        0%, 100% { opacity: var(--op, 0.15); transform: scale(1);   }
        50%       { opacity: calc(var(--op, 0.15) * 2.8); transform: scale(1.4); }
      }

      @keyframes fadein {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: none; }
      }

      @keyframes flash {
        0%   { opacity: 0; transform: translateY(-8px) scale(0.94); }
        10%  { opacity: 1; transform: none; }
        80%  { opacity: 1; transform: none; }
        100% { opacity: 0; transform: translateY(-4px); }
      }

      @keyframes spin    { to { transform: rotate(360deg); } }
      @keyframes shimmer { from { background-position: -200% center; } to { background-position: 200% center; } }

      /* ── Surfaces ───────────────────────────────────────── */
      .glass {
        background: rgba(255,255,255,0.026);
        backdrop-filter: blur(24px) saturate(1.4);
        -webkit-backdrop-filter: blur(24px) saturate(1.4);
        border: 1px solid rgba(255,255,255,0.075);
        box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.055);
      }

      .glass-solid {
        background: rgba(10,8,20,0.9);
        backdrop-filter: blur(40px) saturate(1.6);
        -webkit-backdrop-filter: blur(40px) saturate(1.6);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 24px 80px rgba(0,0,0,0.7),
                    inset 0 1px 0 rgba(255,255,255,0.06),
                    0 0 0 1px rgba(212,168,74,0.05);
      }

      /* ── Cards ──────────────────────────────────────────── */
      .card { transition: border-color 0.25s ease, box-shadow 0.25s ease; }
      .card:hover {
        border-color: rgba(212,168,74,0.2) !important;
        box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(212,168,74,0.07) !important;
      }

      /* ── Inputs ─────────────────────────────────────────── */
      input, textarea, select {
        font-family: 'DM Sans', sans-serif;
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      input:focus, textarea:focus, select:focus {
        border-color: rgba(212,168,74,0.45) !important;
        box-shadow: 0 0 0 3px rgba(212,168,74,0.07), 0 0 12px rgba(212,168,74,0.04) !important;
        outline: none !important;
      }
      input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.16); }

      /* ── Buttons ────────────────────────────────────────── */
      button {
        font-family: 'DM Sans', sans-serif;
        cursor: pointer;
        transition: filter 0.15s ease, transform 0.1s ease, opacity 0.15s ease;
      }
      button:hover:not(:disabled) { filter: brightness(1.14); }
      button:active:not(:disabled) { transform: scale(0.97); }
      button:disabled { opacity: 0.35; cursor: not-allowed; filter: none !important; }

      /* ── Utilities ──────────────────────────────────────── */
      .spinner {
        width: 22px; height: 22px;
        border: 1.5px solid rgba(212,168,74,0.15);
        border-top-color: #d4a84a;
        border-radius: 50%;
        animation: spin 0.75s linear infinite;
      }

      .tabs-row { scrollbar-width: none; }
      .tabs-row::-webkit-scrollbar { display: none; }

      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(212,168,74,0.25); }

      select option { background: #14112a; color: #f0e8d0; }

      /* ── Mobile ─────────────────────────────────────────── */
      .show-mobile-only { display: none !important; }
      @media (max-width: 640px) {
        .grid-2, .grid-3, .grid-4 {
          grid-template-columns: 1fr !important;
        }
        .grid-5 {
          grid-template-columns: 1fr 1fr !important;
        }
        .hide-mobile { display: none !important; }
        .show-mobile-only { display: flex !important; }
        .stack-mobile {
          flex-direction: column !important;
          align-items: stretch !important;
        }
      }

      @media (max-width: 420px) {
        .login-card { padding: 40px 24px 36px !important; }
      }

      /* ── Mobile nav drawer ──────────────────────────────── */
      .mobile-drawer {
        position: fixed; inset: 0; z-index: 100;
        background: rgba(9,8,16,0.97);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        display: flex; flex-direction: column;
        padding: 24px 0;
        animation: fadein 0.18s ease;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
