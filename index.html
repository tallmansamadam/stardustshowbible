<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stardust Club Organizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    body { background: #0d0b14; }
    input, textarea, select { transition: border-color 0.15s, box-shadow 0.15s; }
    input:focus, textarea:focus, select:focus {
      border-color: #d4a84a !important;
      box-shadow: 0 0 0 3px rgba(212,168,74,0.12) !important;
      outline: none !important;
    }
    input::placeholder, textarea::placeholder { color: #554466; }
    button { transition: filter 0.15s, background 0.2s, opacity 0.15s; }
    button:hover:not(:disabled) { filter: brightness(1.18); }
    button:active:not(:disabled) { transform: scale(0.97); }
    select option { background: #13111f; color: #f0e8d0; }
    .card { transition: border-color 0.2s, box-shadow 0.2s; }
    .card:hover { border-color: #554466 !important; box-shadow: 0 2px 16px rgba(155,143,212,0.07); }
  </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
